<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Couleur de la barre navigateur -->
    <meta name="theme-color" content="#1C1C1E" />

    <!-- SEO -->
    <meta name="description" content="Devenir Ingeson — Espace de gestion des formations professionnelles" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ingeson" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo192.png" />

    <!-- PWA Android -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <title>Devenir Ingeson — Formations</title>

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: #1C1C1E;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }

      #root {
        height: 100%;
      }

      /* Masquer la barre de scroll */
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }

      /* Fix iOS safe area */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
    </style>
  </head>
  <body>
    <noscript>Cette application nécessite JavaScript pour fonctionner.</noscript>
    <div id="root"></div>
  </body>
</html>
